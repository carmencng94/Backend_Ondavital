<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acceso Admin - Onda Vital</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #0a0b10;
      --card-bg: rgba(18, 20, 29, 0.6);
      --card-border: rgba(255, 255, 255, 0.08);
      --text-main: #f3f4f6;
      --text-muted: #9ca3af;
      --accent: #6366f1;
      --accent-hover: #4f46e5;
      --accent-glow: rgba(99, 102, 241, 0.4);
      --danger: #ef4444;
      --danger-bg: rgba(239, 68, 68, 0.1);
      --input-bg: rgba(31, 35, 53, 0.5);
      --input-border: rgba(255, 255, 255, 0.1);
      --input-focus: #818cf8;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Montserrat', sans-serif;
      background-color: var(--bg-dark);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Ambient background glows */
    .glow-circle {
      position: absolute;
      border-radius: 50%;
      filter: blur(120px);
      z-index: 1;
      opacity: 0.4;
      pointer-events: none;
    }

    .glow-1 {
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, #4f46e5 0%, transparent 70%);
      top: -100px;
      left: -100px;
      animation: float-slow 20s infinite alternate;
    }

    .glow-2 {
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, #06b6d4 0%, transparent 70%);
      bottom: -150px;
      right: -100px;
      animation: float-slow 25s infinite alternate-reverse;
    }

    @keyframes float-slow {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(50px, 50px) scale(1.1); }
    }

    /* Glassmorphism Container */
    .login-container {
      width: 100%;
      max-width: 440px;
      padding: 24px;
      z-index: 10;
    }

    .login-card {
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 40px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 
                  inset 0 1px 0 rgba(255, 255, 255, 0.1);
      display: flex;
      flex-direction: column;
      align-items: center;
      transform: translateY(0);
      transition: all 0.3s ease;
      animation: slide-up 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes slide-up {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .logo {
      width: 130px;
      margin-bottom: 24px;
      filter: drop-shadow(0 4px 10px rgba(0,0,0,0.3));
      animation: pulse-soft 3s infinite ease-in-out;
    }

    @keyframes pulse-soft {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 600;
      margin-bottom: 8px;
      text-align: center;
      background: linear-gradient(135deg, #ffffff 0%, #a5b4fc 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
    }

    .subtitle {
      font-size: 0.875rem;
      color: var(--text-muted);
      margin-bottom: 32px;
      text-align: center;
    }

    /* Form Styles */
    form {
      width: 100%;
    }

    .input-group {
      width: 100%;
      margin-bottom: 20px;
      position: relative;
      display: flex;
      flex-direction: column;
    }

    .input-group label {
      font-size: 0.8125rem;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      transition: color 0.2s ease;
    }

    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-icon {
      position: absolute;
      left: 16px;
      color: var(--text-muted);
      font-size: 1.1rem;
      pointer-events: none;
      transition: color 0.2s ease;
    }

    .input-field {
      width: 100%;
      padding: 14px 16px 14px 46px;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 12px;
      color: var(--text-main);
      font-size: 0.95rem;
      font-family: inherit;
      outline: none;
      transition: all 0.25s ease;
    }

    .input-field::placeholder {
      color: rgba(255, 255, 255, 0.15);
    }

    .input-field:focus {
      border-color: var(--input-focus);
      background: rgba(31, 35, 53, 0.8);
      box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
    }

    .input-field:focus ~ .input-icon {
      color: var(--input-focus);
    }

    .input-group:focus-within label {
      color: var(--input-focus);
    }

    /* Button Styles */
    .btn-submit {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--accent) 0%, #4f46e5 100%);
      border: none;
      border-radius: 12px;
      color: white;
      font-size: 0.95rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.25s ease;
      box-shadow: 0 4px 12px var(--accent-glow);
      margin-top: 10px;
    }

    .btn-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 18px rgba(99, 102, 241, 0.5);
    }

    .btn-submit:active {
      transform: translateY(0);
    }

    .btn-submit:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    /* Error Message Alert */
    .error-container {
      width: 100%;
      background: var(--danger-bg);
      border: 1px solid rgba(239, 68, 68, 0.2);
      border-radius: 12px;
      padding: 12px 16px;
      margin-bottom: 24px;
      display: none;
      align-items: center;
      gap: 10px;
      animation: shake 0.4s ease;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-6px); }
      40%, 80% { transform: translateX(6px); }
    }

    .error-text {
      color: var(--danger);
      font-size: 0.85rem;
      font-weight: 500;
    }

    /* Spinner loader */
    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 0.8s linear infinite;
      display: none;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
<script>window.API_BASE_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' ? 'http://localhost:3051' : 'https://panelserv.up.railway.app';</script>
</head>
<body>

  <div class="glow-circle glow-1"></div>
  <div class="glow-circle glow-2"></div>

  <div class="login-container">
    <div class="login-card">
      <img src="/assets/images/logo_onda_vital.png" alt="Onda Vital Logo" class="logo" id="logo-img">
      <h1>Acceso de Personal</h1>
      <p class="subtitle">Onda Vital - Portal de Administración</p>

      <div id="error-alert" class="error-container">
        <span class="error-icon">⚠️</span>
        <span id="error-message" class="error-text">Credenciales incorrectas</span>
      </div>

      <form id="login-form">
        <div class="input-group">
          <label for="username">Usuario</label>
          <div class="input-wrapper">
            <span class="input-icon">👤</span>
            <input type="text" id="username" class="input-field" placeholder="Nombre de usuario" required autocomplete="username">
          </div>
        </div>

        <div class="input-group">
          <label for="password">Contraseña</label>
          <div class="input-wrapper">
            <span class="input-icon">🔒</span>
            <input type="password" id="password" class="input-field" placeholder="••••••••" required autocomplete="current-password">
          </div>
        </div>

        <button type="submit" id="btn-submit" class="btn-submit">
          <span id="spinner" class="spinner"></span>
          <span id="btn-text">Iniciar Sesión</span>
        </button>
      </form>
    </div>
  </div>

  <script>
    // Safe error handling for the logo image to prevent CSP issues with inline handlers
    document.getElementById('logo-img').addEventListener('error', function() {
      this.style.display = 'none';
    });

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();

      const usernameInput = document.getElementById('username');
      const passwordInput = document.getElementById('password');
      const errorAlert = document.getElementById('error-alert');
      const errorMessage = document.getElementById('error-message');
      const submitBtn = document.getElementById('btn-submit');
      const spinner = document.getElementById('spinner');
      const btnText = document.getElementById('btn-text');

      // Reset state
      errorAlert.style.display = 'none';
      submitBtn.disabled = true;
      spinner.style.display = 'inline-block';
      btnText.textContent = 'Autenticando...';

      try {
        const url = window.API_BASE_URL + '/api/auth/login';
        const response = await fetch(url, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            username: usernameInput.value,
            password: passwordInput.value
          })
        });

        const data = await response.json();

        if (response.ok && data.success) {
          // Redirect to the admin dashboard
          btnText.textContent = 'Acceso concedido...';
          window.location.href = '/admin';
        } else {
          // Show error message
          errorMessage.textContent = data.message || 'Error de autenticación';
          errorAlert.style.display = 'flex';
          
          // Re-enable form
          submitBtn.disabled = false;
          spinner.style.display = 'none';
          btnText.textContent = 'Iniciar Sesión';
        }
      } catch (err) {
        console.error(err);
        errorMessage.textContent = 'Error de conexión con el servidor. Inténtalo de nuevo.';
        errorAlert.style.display = 'flex';
        
        // Re-enable form
        submitBtn.disabled = false;
        spinner.style.display = 'none';
        btnText.textContent = 'Iniciar Sesión';
      }
    });
  </script>
</body>
</html>
